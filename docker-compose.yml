services:
  voicebox:
    image: ghcr.io/jamiepine/voicebox:${VOICEBOX_VERSION:-latest}
    container_name: voicebox
    restart: unless-stopped

    ports:
      # Publish on the configured remote-access interfaces.
      - "${VOICEBOX_BIND_IP:-127.0.0.1}:${VOICEBOX_WEB_PORT:-17493}:8000"
      - "${VOICEBOX_LAN_BIND_IP:-192.168.1.2}:${VOICEBOX_WEB_PORT:-17493}:8000"

    volumes:
      # Bind-mount for generated audio (customize the host path as needed)
      # Host side:      ./output/
      # Container side: /app/data/generations/
      - ./output:/app/data/generations

      # Named volume for profiles, DB, cache (persists across container restarts)
      - voicebox-data:/app/data

      # HuggingFace model cache (so models aren't re-downloaded on rebuild)
      - huggingface-cache:/home/voicebox/.cache/huggingface

    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NUMBA_CACHE_DIR: /tmp/numba_cache
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}

    networks:
      - voicebox-net

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

networks:
  voicebox-net:
    driver: bridge

volumes:
  voicebox-data:
  huggingface-cache:
